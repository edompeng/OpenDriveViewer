name: Cross-Platform Build & Release Pipeline

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write
  actions: write
  id-token: write
  attestations: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            job_name: linux
            qt_host: 'linux'
            qt_arch: 'linux_gcc_64'
            vcpkg_triplet: 'x64-linux'
            qt_version: '6.9.*'
            artifact_name: 'app-linux.tar.gz'
            
          - os: macos-14
            job_name: macos
            qt_host: 'mac'
            qt_arch: 'clang_64'
            vcpkg_triplet: 'arm64-osx'
            qt_version: '6.9.1'
            artifact_name: 'app-macos.dmg'
            
          - os: windows-2022
            job_name: windows
            qt_host: 'windows'
            qt_arch: 'win64_msvc2022_64'
            vcpkg_triplet: 'x64-windows'
            qt_version: '6.9.1'
            artifact_name: 'app-windows.zip'

    env:
      VCPKG_BINARY_SOURCES: 'clear;x-gha,readwrite'
      VCPKG_ROOT: ${{ github.workspace }}/vcpkg
      VCPKG_DOWNLOADS: ${{ github.workspace }}/vcpkg_downloads

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install System Dependencies (Linux)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev libglu1-mesa-dev xvfb patchelf libproj-dev libunwind-dev libgoogle-perftools-dev

      - name: Install System Dependencies (macOS)
        if: matrix.os == 'macos-14'
        run: |
          brew install proj

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ matrix.qt_version }}
          host: ${{ matrix.qt_host }}
          target: 'desktop'
          arch: ${{ matrix.qt_arch }}
          cache: true
          # More specific cache key to avoid architecture/version mismatches
          cache-key-prefix: qt-${{ matrix.os }}-${{ matrix.qt_version }}-${{ matrix.qt_arch }}

      # Use the vcpkg from cache or let it be cloned/built once.
      # x-gha handles package persistence.

      - name: Cache vcpkg tool
        if: matrix.os == 'windows-2022'
        uses: actions/cache@v5
        with:
          path: ${{ env.VCPKG_ROOT }}
          key: vcpkg-tool-${{ runner.os }}-bazel-v1
          restore-keys: |
            vcpkg-tool-${{ runner.os }}-bazel-
            vcpkg-tool-${{ runner.os }}-

      - name: Setup vcpkg (Windows only for PROJ)
        if: matrix.os == 'windows-2022'
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: ${{ env.VCPKG_ROOT }}
          vcpkgGitCommitId: 'c3867e714dd3a51c272826eea77267876517ed99'
          vcpkgJsonGlob: 'vcpkg.json'
          runVcpkgInstall: true
        env:
          VCPKG_DEFAULT_TRIPLET: ${{ matrix.vcpkg_triplet }}
          VCPKG_INSTALLED_DIR: '${{ github.workspace }}/vcpkg_installed'
          VCPKG_DOWNLOADS: ${{ env.VCPKG_DOWNLOADS }}

      - name: Set Environment Variables
        shell: bash
        run: |
          echo "QT6_ROOT=${{ env.QT_ROOT_DIR }}" >> $GITHUB_ENV
          if [ "${{ matrix.os }}" = "ubuntu-22.04" ]; then
            echo "PROJ_ROOT=/usr" >> $GITHUB_ENV
          elif [ "${{ matrix.os }}" = "macos-14" ]; then
            echo "PROJ_ROOT=$(brew --prefix proj)" >> $GITHUB_ENV
          elif [ "${{ matrix.os }}" = "windows-2022" ]; then
            # Elegant solution: vcpkg in manifest mode puts artifacts in vcpkg_installed/<triplet>.
            # The packaging script will find all DLLs inside the 'bin' subdirectory.
            echo "PROJ_ROOT=${{ github.workspace }}/vcpkg_installed/${{ matrix.vcpkg_triplet }}" >> $GITHUB_ENV
          fi

      - name: Cache Bazel
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/bazel-repo
            ~/.cache/bazel-disk
          # Key includes all files that can trigger a full dependency re-fetch
          key: bazel-${{ matrix.os }}-${{ hashFiles('**/BUILD*', '**/WORKSPACE*', 'MODULE.bazel', '*.bzl') }}
          restore-keys: |
            bazel-${{ matrix.os }}-

      - name: Build and Test with Bazel
        shell: bash
        run: |
          BAZEL_STARTUP_OPTS="--host_jvm_args=-Djava.net.preferIPv4Stack=true"
          BAZEL_OPTS="--repository_cache=$HOME/.cache/bazel-repo --disk_cache=$HOME/.cache/bazel-disk --keep_going --show_result=10 --registry=https://bcr.bazel.build"
          COMMON_FLAGS="-c opt"
          
          if [ "${{ matrix.os }}" = "ubuntu-22.04" ]; then
            xvfb-run --auto-servernum bazel $BAZEL_STARTUP_OPTS test $COMMON_FLAGS //... --test_output=errors $BAZEL_OPTS --config=linux \
              --action_env=QT6_ROOT="${{ env.QT_ROOT_DIR }}" \
              --action_env=PROJ_ROOT="${{ env.PROJ_ROOT }}"
          elif [ "${{ matrix.os }}" = "windows-2022" ]; then
            TCMALLOC_LIB=$(find "${{ env.PROJ_ROOT }}/lib" -name "*tcmalloc*.lib" | head -n 1 | tr '/' '\\')
            export PATH="${{ env.PROJ_ROOT }}/bin:$PATH"
            bazel $BAZEL_STARTUP_OPTS test $COMMON_FLAGS --linkopt="${TCMALLOC_LIB}" //... --test_output=errors $BAZEL_OPTS --config=windows \
              --action_env=QT6_ROOT="${{ env.QT_ROOT_DIR }}" \
              --action_env=PROJ_ROOT="${{ env.PROJ_ROOT }}" \
              --action_env=GITHUB_WORKSPACE="${{ github.workspace }}" \
              --test_env=PATH
          else
            bazel $BAZEL_STARTUP_OPTS test $COMMON_FLAGS //... --test_output=errors $BAZEL_OPTS --config=macos \
              --action_env=QT6_ROOT="${{ env.QT_ROOT_DIR }}" \
              --action_env=PROJ_ROOT="${{ env.PROJ_ROOT }}"
          fi

      - name: Package (Linux)
        if: matrix.os == 'ubuntu-22.04' && startsWith(github.ref, 'refs/tags/v')
        run: |
          chmod +x scripts/deploy/package_linux.sh
          ./scripts/deploy/package_linux.sh
          # Create archive for release
          tar -czvf ${{ github.workspace }}/${{ matrix.artifact_name }} -C dist/linux OpenDriveViewer_linux_x64
      
      - name: Package (macOS)
        if: matrix.os == 'macos-14' && startsWith(github.ref, 'refs/tags/v')
        run: |
          chmod +x scripts/deploy/package_macos.sh
          ./scripts/deploy/package_macos.sh
          # The script produces dist/mac/OpenDriveViewer.dmg, move it to root for upload
          mv dist/mac/OpenDriveViewer.dmg ${{ github.workspace }}/${{ matrix.artifact_name }}

      - name: Package (Windows)
        if: matrix.os == 'windows-2022' && startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          QT6_ROOT: ${{ env.QT6_ROOT }}
          PROJ_ROOT: ${{ env.PROJ_ROOT }}
        run: |
          ./scripts/deploy/package_windows.ps1
          # The script produces a folder: dist/windows/OpenDriveViewer_win_x64
          Compress-Archive -Path dist/windows/OpenDriveViewer_win_x64 -DestinationPath ${{ github.workspace }}/${{ matrix.artifact_name }}

      - name: Generate Artifact Attestation
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: ${{ github.workspace }}/${{ matrix.artifact_name }}

      - name: Upload Intermediate Artifact
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ github.workspace }}/${{ matrix.artifact_name }}
          retention-days: 1

      - name: Upload Symbols Artifact
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v6
        with:
          name: symbols-${{ matrix.os }}
          path: |
            ${{ github.workspace }}/*symbols.zip
            ${{ github.workspace }}/*symbols.tar.gz
          retention-days: 1

      - name: Cleanup Old Caches
        if: always()
        shell: bash
        run: |
          # Keep only the 10 most recent caches for the current branch to avoid hitting the 10GB limit
          gh cache list --ref ${{ github.ref }} --limit 100 --json id,createdAt -q 'sort_by(.createdAt) | reverse | .[10:] | .[].id' | xargs -I {} gh cache delete {} || true
        env:
          GH_TOKEN: ${{ github.token }}

  build-cmake:
    name: CMake Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            job_name: linux-cmake
            vcpkg_triplet: 'x64-linux'
            qt_version: '6.9.*'
          - os: macos-14
            job_name: macos-cmake
            vcpkg_triplet: 'arm64-osx'
            qt_version: '6.9.1'
          - os: windows-2022
            job_name: windows-cmake
            vcpkg_triplet: 'x64-windows'
            qt_version: '6.9.1'

    env:
      VCPKG_BINARY_SOURCES: 'clear;x-gha,readwrite'
      VCPKG_ROOT: ${{ github.workspace }}/vcpkg
      VCPKG_DOWNLOADS: ${{ github.workspace }}/vcpkg_downloads
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install System Dependencies
        if: matrix.os != 'windows-2022'
        run: |
          if [ "${{ matrix.os }}" = "ubuntu-22.04" ]; then
            sudo apt-get update && sudo apt-get install -y libgl1-mesa-dev libglu1-mesa-dev xvfb libproj-dev libunwind-dev libgoogle-perftools-dev ninja-build
          else
            brew install proj ninja
          fi

      - name: Setup Ccache
        uses: hendrikmuhs/ccache-action@v1
        with:
          key: ${{ matrix.os }}-ccache
          variant: ccache
          append-timestamp: false

      # Use vcpkg from cache or clone/build once.
      
      - name: Cache vcpkg tool
        if: matrix.os == 'windows-2022'
        uses: actions/cache@v5
        with:
          path: ${{ env.VCPKG_ROOT }}
          key: vcpkg-tool-${{ runner.os }}-cmake-v1
          restore-keys: |
            vcpkg-tool-${{ runner.os }}-cmake-
            vcpkg-tool-${{ runner.os }}-

      - name: Setup vcpkg (Windows only for PROJ)
        if: matrix.os == 'windows-2022'
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: ${{ env.VCPKG_ROOT }}
          vcpkgGitCommitId: 'c3867e714dd3a51c272826eea77267876517ed99'
          vcpkgJsonGlob: 'vcpkg.json'
          runVcpkgInstall: true
        env:
          VCPKG_DEFAULT_TRIPLET: ${{ matrix.vcpkg_triplet }}
          VCPKG_INSTALLED_DIR: '${{ github.workspace }}/vcpkg_installed'
          VCPKG_DOWNLOADS: ${{ env.VCPKG_DOWNLOADS }}

      - name: Setup MSVC
        if: matrix.os == 'windows-2022'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ matrix.qt_version }}
          cache: true

      - name: Set Environment Variables
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "ubuntu-22.04" ]; then
            echo "PROJ_ROOT=/usr" >> $GITHUB_ENV
          elif [ "${{ matrix.os }}" = "macos-14" ]; then
            echo "PROJ_ROOT=$(brew --prefix proj)" >> $GITHUB_ENV
          elif [ "${{ matrix.os }}" = "windows-2022" ]; then
            echo "PROJ_ROOT=${{ github.workspace }}/vcpkg_installed/${{ matrix.vcpkg_triplet }}" >> $GITHUB_ENV
          fi

      - name: Cache CMake FetchContent
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/cmake_deps
          key: cmake-deps-${{ matrix.os }}-${{ hashFiles('CMakeLists.txt', 'src/CMakeLists.txt') }}
          restore-keys: |
            cmake-deps-${{ matrix.os }}-

      - name: Configure and Build
        shell: bash
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DFETCHCONTENT_BASE_DIR="${{ github.workspace }}/cmake_deps" \
            -DQT_PATH="${{ env.QT_ROOT_DIR }}" \
            -DPROJ_ROOT="${{ env.PROJ_ROOT }}" \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
          cmake --build build --config RelWithDebInfo

      - name: Test
        shell: bash
        run: |
          cd build
          if [ "${{ matrix.os }}" = "ubuntu-22.04" ]; then
            xvfb-run --auto-servernum ctest -C RelWithDebInfo --output-on-failure
          else
            ctest -C RelWithDebInfo --output-on-failure
          fi

      - name: Cleanup Old Caches
        if: always()
        shell: bash
        run: |
          # Keep only the 10 most recent caches for the current branch to avoid hitting the 10GB limit
          gh cache list --ref ${{ github.ref }} --limit 100 --json id,createdAt -q 'sort_by(.createdAt) | reverse | .[10:] | .[].id' | xargs -I {} gh cache delete {} || true
        env:
          GH_TOKEN: ${{ github.token }}

  release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v6
        with:
          path: release-assets
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          name: Release ${{ github.ref_name }}
          files: release-assets/*
          generate_release_notes: true